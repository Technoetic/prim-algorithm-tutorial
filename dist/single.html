/* === tokens.css === */
/* tokens.css — 디자인 토큰 (색/간격/반경/폰트/트랜지션) */

:root {
  --bg: #faf8f4;
  --surface: #fff;
  --text: #1a1a1a;
  --text-muted: #555;
  --accent: #d9392b;
  --accent-soft: #ffe9e5;
  --ok: #2e8540;
  --warn: #f0b429;
  --line: #e2ded3;
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-6: 24px;
  --sp-8: 32px;
  --sp-12: 48px;
  --sp-16: 64px;
  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 12px;
  --font-ui: "Helvetica Neue", "Arial", sans-serif;
  --font-body: "Georgia", "Times New Roman", serif;
  --font-mono: "JetBrains Mono", "Courier New", monospace;
  --fs-1: 14px;
  --fs-2: 17px;
  --fs-3: 22px;
  --fs-4: 40px;
  --fw-regular: 400;
  --fw-bold: 700;
  --transition-duration: 300ms;
  --shadow-card: 0 1px 3px rgb(0 0 0 / 8%);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: var(--fs-2);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
  border: 0;
}

/* === layout.css === */
/* layout.css — 전역 레이아웃(메인/탑바/챕터/히어로) */

main {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 var(--sp-4);
}

@media (width >= 768px) {
  main {
    padding: 0 var(--sp-8);
  }
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: var(--sp-3) var(--sp-4);
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  font-family: var(--font-ui);
}

.topbar__brand {
  font-weight: var(--fw-bold);
  font-size: var(--fs-2);
}

.topbar__progress {
  flex: 1;
  font-size: var(--fs-1);
  color: var(--text-muted);
}

.topbar__links {
  display: flex;
  gap: var(--sp-3);
  font-size: var(--fs-1);
}

.topbar__links a {
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid transparent;
}

.topbar__links a:hover,
.topbar__links a:focus-visible {
  border-bottom-color: var(--accent);
}

.chapter {
  padding-block: var(--sp-16);
  max-width: 700px;
  margin: 0 auto;
}

.chapter h2 {
  font-family: var(--font-ui);
  font-weight: var(--fw-bold);
  font-size: var(--fs-3);
  margin: 0 0 var(--sp-2);
  color: var(--text);
}

.chapter__lead {
  color: var(--text-muted);
  font-size: var(--fs-2);
  margin: 0 0 var(--sp-6);
}

.hero h1 {
  font-family: var(--font-ui);
  font-weight: var(--fw-bold);
  font-size: var(--fs-4);
  line-height: 1.1;
  margin: 0 0 var(--sp-4);
  color: var(--text);
}

.hero__subtitle {
  font-family: var(--font-body);
  font-size: var(--fs-3);
  color: var(--text-muted);
  margin: 0 0 var(--sp-8);
}

.hero__viz {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  margin-bottom: var(--sp-6);
  display: block;
  box-shadow: var(--shadow-card);
}

.concept-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-4);
  margin-top: var(--sp-4);
}

@media (width <= 1023px) {
  .concept-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (width <= 767px) {
  .concept-grid {
    grid-template-columns: 1fr;
  }
}

.footer {
  padding: var(--sp-8) var(--sp-4);
  font-size: var(--fs-1);
  color: var(--text-muted);
  text-align: center;
  border-top: 1px solid var(--line);
  margin-top: var(--sp-16);
}

/* === components.css === */
/* components.css — 버튼/카드/코드패널/컨트롤 바 */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
  min-height: 44px;
  min-width: 44px;
  padding: var(--sp-3) var(--sp-6);
  font-family: var(--font-ui);
  font-size: var(--fs-2);
  font-weight: var(--fw-bold);
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  border-radius: var(--r-md);
  cursor: pointer;
  transition:
    transform var(--transition-duration) ease-in-out,
    background var(--transition-duration) ease-in-out,
    border-color var(--transition-duration) ease-in-out;
}

.btn:hover {
  transform: translateY(1px);
  box-shadow: var(--shadow-card);
}

.btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.btn--primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn--primary:hover {
  background: #b8291d;
}

.btn.active {
  background: #fff0ec;
  border-color: var(--accent);
  color: #6b1108;
}

.concept-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--sp-4);
}

.concept-card h3 {
  font-family: var(--font-ui);
  font-size: var(--fs-2);
  font-weight: var(--fw-bold);
  margin: 0 0 var(--sp-2);
}

.concept-card p {
  margin: 0;
  font-size: var(--fs-1);
  color: var(--text-muted);
}

.play-layout__toast {
  background: #fffbf0;
  border-left: 3px solid var(--accent);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--r-sm);
  font-size: var(--fs-2);
  min-height: 52px;
}

.play-layout__viz {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  height: 420px;
  padding: var(--sp-2);
  overflow: hidden;
}

.play-layout__viz svg {
  width: 100%;
  height: 100%;
  display: block;
}

@media (max-width: 1023px) {
  .play-layout__viz {
    height: auto;
    min-height: 320px;
    aspect-ratio: 4 / 3;
  }
}

.play-layout__code {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: var(--sp-4);
  font-family: var(--font-mono);
  font-size: var(--fs-1);
  overflow-y: auto;
  max-height: 420px;
}

.code-line {
  padding: 2px var(--sp-2);
  border-radius: var(--r-sm);
  transition: background var(--transition-duration) ease-in-out;
  white-space: pre;
  color: var(--text);
}

.code-line.active {
  background: #fff0ec;
  color: #6b1108;
  font-weight: var(--fw-bold);
}

.stats {
  margin-top: var(--sp-4);
  padding-top: var(--sp-3);
  border-top: 1px dashed var(--line);
  font-family: var(--font-mono);
  font-size: var(--fs-1);
  color: var(--text-muted);
  line-height: 1.8;
}

.stats strong {
  color: var(--text);
}

.play-layout__control {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-3);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  position: sticky;
  bottom: 0;
}

.control-group {
  display: flex;
  gap: var(--sp-2);
}

.control-group--speed {
  margin-left: auto;
  padding-left: var(--sp-3);
  border-left: 1px solid var(--line);
}

.control-group--speed .btn,
.control-group--preset .btn {
  min-width: 64px;
  padding: var(--sp-2) var(--sp-3);
}

.control-group--preset {
  padding-left: var(--sp-3);
  border-left: 1px solid var(--line);
}

.control-group--progress {
  font-family: var(--font-mono);
  font-size: var(--fs-1);
  color: var(--text-muted);
  margin-left: var(--sp-4);
}

.preset-tabs {
  display: flex;
  gap: var(--sp-2);
  margin-bottom: var(--sp-4);
}

.gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-4);
  margin-top: var(--sp-6);
}

@media (width <= 767px) {
  .gallery {
    grid-template-columns: 1fr;
  }
}

.gallery__card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--sp-4);
}

.gallery__card h3 {
  font-family: var(--font-ui);
  font-size: var(--fs-2);
  margin: 0 0 var(--sp-2);
}

.gallery__card p {
  margin: 0;
  font-size: var(--fs-1);
  color: var(--text-muted);
}

/* === viz.css === */
/* viz.css — 인터랙티브 SVG 시각화 상태 스타일 + Chapter 3 그리드 */

.chapter-play {
  max-width: 1120px;
}

.play-layout {
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto auto auto;
  gap: var(--sp-4);
}

@media (width >= 1024px) {
  .play-layout {
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto 1fr auto;
  }

  .play-layout__toast {
    grid-column: 1 / -1;
  }

  .play-layout__viz {
    grid-column: 1;
    grid-row: 2;
  }

  .play-layout__code {
    grid-column: 2;
    grid-row: 2;
  }

  .play-layout__control {
    grid-column: 1 / -1;
    grid-row: 3;
  }
}

/* SVG 정점 상태 */
.node circle {
  fill: var(--surface);
  stroke: var(--text-muted);
  transition:
    fill var(--transition-duration) ease-in-out,
    stroke var(--transition-duration) ease-in-out,
    transform var(--transition-duration) ease-in-out;
}

.node text {
  fill: var(--text);
  pointer-events: none;
}

.node.state-frontier circle {
  fill: #fff5d6;
  stroke: var(--warn);
}

.node.state-in-tree circle {
  fill: #e6f4ea;
  stroke: var(--ok);
}

.node.state-current circle {
  fill: var(--accent-soft);
  stroke: var(--accent);
  stroke-width: 3;
}

.node.state-current {
  transform-box: fill-box;
  transform-origin: center;
  animation: pulse 1200ms ease-in-out infinite;
}

@keyframes pulse {
  0%,
  100% {
    opacity: 1;
  }

  50% {
    opacity: 0.85;
  }
}

.node:focus-visible {
  outline: none;
}

.node:focus-visible circle {
  stroke: var(--accent);
  stroke-width: 4;
}

/* SVG 간선 상태 */
.edge {
  stroke: var(--line);
  transition:
    stroke var(--transition-duration) ease-in-out,
    stroke-width var(--transition-duration) ease-in-out,
    opacity var(--transition-duration) ease-in-out;
}

.edge.state-candidate {
  stroke: var(--warn);
  stroke-dasharray: 6 4;
  stroke-width: 4;
}

.edge.state-selected {
  stroke: var(--ok);
  stroke-width: 5;
}

.edge.state-rejected {
  stroke: #bbb;
  stroke-dasharray: 2 4;
  opacity: 0.5;
}

.edge-label text {
  fill: var(--text);
}

    <script>
const __PRESETS__ = {"cable":{"name":"통신사 광케이블 깔기","story":"새 동네의 여섯 집에 인터넷 케이블을 가장 싸게 깔아볼까요. 간선 위 숫자는 도로 공사 비용(만 원)입니다.","weightUnit":"만 원","startNodeId":"A","nodes":[{"id":"A","x":140,"y":140,"label":"A"},{"id":"B","x":420,"y":80,"label":"B"},{"id":"C","x":260,"y":260,"label":"C"},{"id":"D","x":560,"y":220,"label":"D"},{"id":"E","x":760,"y":400,"label":"E"},{"id":"F","x":420,"y":440,"label":"F"}],"edges":[{"id":"AB","u":"A","v":"B","weight":4},{"id":"AC","u":"A","v":"C","weight":1},{"id":"BC","u":"B","v":"C","weight":3},{"id":"BD","u":"B","v":"D","weight":5},{"id":"CD","u":"C","v":"D","weight":2},{"id":"CF","u":"C","v":"F","weight":6},{"id":"DE","u":"D","v":"E","weight":4},{"id":"DF","u":"D","v":"F","weight":3},{"id":"EF","u":"E","v":"F","weight":2}]},"grid":{"name":"도시 전력망 설계","story":"도시 7개 거점에 전력선을 가장 짧게 이어 전기를 공급해봅시다. 숫자는 전선 길이(km)입니다.","weightUnit":"km","startNodeId":"S1","nodes":[{"id":"S1","x":100,"y":120,"label":"S1"},{"id":"S2","x":280,"y":60,"label":"S2"},{"id":"S3","x":460,"y":140,"label":"S3"},{"id":"S4","x":640,"y":80,"label":"S4"},{"id":"S5","x":220,"y":280,"label":"S5"},{"id":"S6","x":460,"y":320,"label":"S6"},{"id":"S7","x":680,"y":260,"label":"S7"}],"edges":[{"id":"e12","u":"S1","v":"S2","weight":3},{"id":"e15","u":"S1","v":"S5","weight":4},{"id":"e23","u":"S2","v":"S3","weight":2},{"id":"e25","u":"S2","v":"S5","weight":6},{"id":"e34","u":"S3","v":"S4","weight":5},{"id":"e36","u":"S3","v":"S6","weight":3},{"id":"e47","u":"S4","v":"S7","weight":2},{"id":"e56","u":"S5","v":"S6","weight":4},{"id":"e67","u":"S6","v":"S7","weight":3}]},"maze":{"name":"랜덤 미로 씨앗 그래프","story":"격자형 그래프에 프림을 적용하면 미로가 만들어져요. 작은 4×3 격자에서 실험해봅시다.","weightUnit":"","startNodeId":"n00","nodes":[{"id":"n00","x":120,"y":120,"label":"A"},{"id":"n10","x":280,"y":120,"label":"B"},{"id":"n20","x":440,"y":120,"label":"C"},{"id":"n30","x":600,"y":120,"label":"D"},{"id":"n01","x":120,"y":260,"label":"E"},{"id":"n11","x":280,"y":260,"label":"F"},{"id":"n21","x":440,"y":260,"label":"G"},{"i class GraphValidationError extends Error {
  constructor(message) {
    super(message);
    this.name = 'GraphValidationError';
  }
}
class Graph {
  constructor(nodes = [], edges = []) {
    this.nodes = nodes.map((n) => ({ ...n }));
    this.edges = edges.map((e) => ({ ...e }));
    this._nodeIndex = new Map(this.nodes.map((n) => [n.id, n]));
    this._edgeIndex = new Map(this.edges.map((e) => [e.id, e]));
    this._adj = null;
  }

  addNode(node) {
    if (this._nodeIndex.has(node.id)) {
      throw new GraphValidationError(`중복 정점 id: ${node.id}`);
    }
    this.nodes.push({ ...node });
    this._nodeIndex.set(node.id, this.nodes[this.nodes.length - 1]);
    this._adj = null;
    return this;
  }

  addEdge(edge) {
    if (this._edgeIndex.has(edge.id)) {
      throw new GraphValidationError(`중복 간선 id: ${edge.id}`);
    }
    if (!this._nodeIndex.has(edge.u) || !this._nodeIndex.has(edge.v)) {
      throw new GraphValidationError(`존재하지 않는 정점 참조: ${edge.u}-${edge.v}`);
    }
    this.edges.push({ ...edge });
    this._edgeIndex.set(edge.id, this.edges[this.edges.length - 1]);
    this._adj = null;
    return this;
  }

  getNode(id) {
    return this._nodeIndex.get(id);
  }

  getEdge(id) {
    return this._edgeIndex.get(id);
  }

  getNeighbors(nodeId) {
    if (!this._adj) this._buildAdj();
    return this._adj.get(nodeId) ?? [];
  }

  _buildAdj() {
    this._adj = new Map(this.nodes.map((n) => [n.id, []]));
    for (const e of this.edges) {
      this._adj.get(e.u).push({ to: e.v, weight: e.weight, edgeId: e.id });
      this._adj.get(e.v).push({ to: e.u, weight: e.weight, edgeId: e.id });
    }
    // 재현성: neighbor를 id 오름차순으로 정렬
    for (const list of this._adj.values()) {
      list.sort((a, b) => (a.to < b.to ? -1 : a.to > b.to ? 1 : 0));
    }
  }

  clone() {
    return new Graph(this.nodes, this.edges);
  }

  static validate(presetJson) {
    if (!presetJson || typeof presetJson !== 'object') {
      throw new GraphValidationError('프리셋이 객체가 아닙니다.');
    }
    const { nodes, edges, startNodeId } = presetJson;
    if (!Array.isArray(nodes) || nodes.length === 0) {
      throw new GraphValidationError('정점 목록이 비어 있습니다.');
    }
    if (!Array.isArray(edges)) {
      throw new GraphValidationError('간선 목록이 배열이 아닙니다.');
    }
    const ids = new Set();
    for (const n of nodes) {
      if (!n || typeof n.id !== 'string') {
        throw new GraphValidationError('정점 id가 문자열이 아닙니다.');
      }
      if (ids.has(n.id)) {
        throw new GraphValidationError(`중복 정점 id: ${n.id}`);
      }
      ids.add(n.id);
    }
    const edgeIds = new Set();
    for (const e of edges) {
      if (!e || typeof e.id !== 'string') {
        throw new GraphValidationError('간선 id가 문자열이 아닙니다.');
      }
      if (edgeIds.has(e.id)) {
        throw new GraphValidationError(`중복 간선 id: ${e.id}`);
      }
      edgeIds.add(e.id);
      if (!ids.has(e.u) || !ids.has(e.v)) {
        throw new GraphValidationError(`존재하지 않는 정점 참조: ${e.id} (${e.u}-${e.v})`);
      }
      if (typeof e.weight !== 'number' || Number.isNaN(e.weight)) {
        throw new GraphValidationError(`가중치가 숫자가 아닙니다: ${e.id}`);
      }
    }
    if (startNodeId && !ids.has(startNodeId)) {
      throw new GraphValidationError(`시작 정점이 존재하지 않습니다: ${startNodeId}`);
    }
  }

  static fromPreset(presetJson) {
    Graph.validate(presetJson);
    return new Graph(presetJson.nodes, presetJson.edges);
  }
}

// src/prim.js — PrimEngine: 프림 알고리즘 스텝 제너레이터
// 의존성: graph.js

/**
 * @typedef {Object} StepState
 * @property {number} idx
 * @property {'init'|'pick'|'relax'|'reject'|'done'} phase
 * @property {string|null} currentNodeId
 * @property {Set<string>} mstNodeIds
 * @property {Set<string>} mstEdgeIds
 * @property {Map<string, {cost:number, viaEdgeId:string}>} frontier
 * @property {string|null} consideredEdgeId
 * @property {'cycle'|'higher-weight'|null} rejectedReason
 * @property {number} totalCost
 * @property {string} explainKo
 * @property {number} codeLine
 */
class PrimEngine {
  constructor(graph, startNodeId) {
    if (!(graph instanceof Graph)) {
      throw new TypeError('graph는 Graph 인스턴스여야 합니다.');
    }
    if (graph.nodes.length === 0) {
      this.graph = graph;
      this.startNodeId = null;
      this.steps = [
        this._buildStep({
          idx: 0,
          phase: 'done',
          currentNodeId: null,
          mstNodeIds: new Set(),
          mstEdgeIds: new Set(),
          frontier: new Map(),
          consideredEdgeId: null,
          rejectedReason: null,
          totalCost: 0,
          explainKo: '그래프가 비어 있어요.',
          codeLine: 0,
        }),
      ];
      this.totalSteps = 1;
      return;
    }
    if (!graph.getNode(startNodeId)) {
      throw new Error(`시작 정점이 존재하지 않습니다: ${startNodeId}`);
    }
    this.graph = graph;
    this.startNodeId = startNodeId;
    this.steps = [];
    this.#computeAllSteps();
    this.totalSteps = this.steps.length;
  }

  getStep(idx) {
    if (idx < 0) idx = 0;
    if (idx >= this.totalSteps) idx = this.totalSteps - 1;
    return this.steps[idx];
  }

  _buildStep(s) {
    return Object.freeze({
      idx: s.idx,
      phase: s.phase,
      currentNodeId: s.currentNodeId,
      mstNodeIds: s.mstNodeIds,
      mstEdgeIds: s.mstEdgeIds,
      frontier: s.frontier,
      consideredEdgeId: s.consideredEdgeId,
      rejectedReason: s.rejectedReason,
      totalCost: s.totalCost,
      explainKo: s.explainKo,
      codeLine: s.codeLine ?? 0,
    });
  }

  #computeAllSteps() {
    const g = this.graph;
    const mstNodes = new Set();
    const mstEdges = new Set();
    // frontier: nodeId -> { cost, viaEdgeId }
    const frontier = new Map();
    let totalCost = 0;
    let stepIdx = 0;

    // Step 0: init
    frontier.set(this.startNodeId, { cost: 0, viaEdgeId: null });
    this.steps.push(
      this._buildStep({
        idx: stepIdx++,
        phase: 'init',
        currentNodeId: null,
        mstNodeIds: new Set(mstNodes),
        mstEdgeIds: new Set(mstEdges),
        frontier: new Map(frontier),
        consideredEdgeId: null,
        rejectedReason: null,
        totalCost,
        explainKo: `시작 정점 "${this.startNodeId}"에서 트리를 시작합니다.`,
        codeLine: 1,
      }),
    );

    const pushRelaxStep = (phase, pickId, edgeId, rejectedReason, explainKo, codeLine) => {
      this.steps.push(
        this._buildStep({
          idx: stepIdx++,
          phase,
          currentNodeId: pickId,
          mstNodeIds: new Set(mstNodes),
          mstEdgeIds: new Set(mstEdges),
          frontier: new Map(frontier),
          consideredEdgeId: edgeId,
          rejectedReason,
          totalCost,
          explainKo,
          codeLine,
        }),
      );
    };

    while (mstNodes.size < g.nodes.length && frontier.size > 0) {
      // pick: frontier에서 비용 최소 + id 오름차순 tie-break
      const picked = this._pickMin(frontier);
      if (!picked) break;
      const [pickId, pickEntry] = picked;
      frontier.delete(pickId);
      mstNodes.add(pickId);
      if (pickEntry.viaEdgeId) {
        mstEdges.add(pickEntry.viaEdgeId);
        totalCost += pickEntry.cost;
      }
      this.steps.push(
        this._buildStep({
          idx: stepIdx++,
          phase: 'pick',
          currentNodeId: pickId,
          mstNodeIds: new Set(mstNodes),
          mstEdgeIds: new Set(mstEdges),
          frontier: new Map(frontier),
          consideredEdgeId: pickEntry.viaEdgeId,
          rejectedReason: null,
          totalCost,
          explainKo: pickEntry.viaEdgeId
            ? `정점 "${pickId}"를 비용 ${pickEntry.cost}로 트리에 추가합니다.`
            : `시작 정점 "${pickId}"를 트리에 포함합니다.`,
          codeLine: 6,
        }),
      );

      // relax: 이웃 탐색
      const neighbors = g.getNeighbors(pickId);
      for (const { to, weight, edgeId } of neighbors) {
        if (mstNodes.has(to)) {
          if (mstEdges.has(edgeId)) continue;
          pushRelaxStep(
            'reject',
            pickId,
            edgeId,
            'cycle',
            `간선 ${edgeId}는 이미 트리에 있는 두 정점을 다시 연결하므로 거절합니다. (사이클 방지)`,
            10,
          );
          continue;
        }
        const existing = frontier.get(to);
        if (
          !existing ||
          weight < existing.cost ||
          (weight === existing.cost && edgeId < existing.viaEdgeId)
        ) {
          frontier.set(to, { cost: weight, viaEdgeId: edgeId });
          pushRelaxStep(
            'relax',
            pickId,
            edgeId,
            null,
            `정점 "${to}"로 가는 비용을 ${weight}로 갱신합니다. (간선 ${edgeId})`,
            11,
          );
        } else {
          pushRelaxStep(
            'reject',
            pickId,
            edgeId,
            'higher-weight',
            `간선 ${edgeId}(비용 ${weight})는 현재 "${to}"의 더 싼 경로보다 비싸서 건너뜁니다.`,
            11,
          );
        }
      }
    }

    // done
    const isDisconnected = mstNodes.size < g.nodes.length;
    this.steps.push(
      this._buildStep({
        idx: stepIdx++,
        phase: 'done',
        currentNodeId: null,
        mstNodeIds: new Set(mstNodes),
        mstEdgeIds: new Set(mstEdges),
        frontier: new Map(),
        consideredEdgeId: null,
        rejectedReason: null,
        totalCost,
        explainKo: isDisconnected
          ? `완료. 단, 연결되지 않은 정점이 ${g.nodes.length - mstNodes.size}개 있어요.`
          : `완료! 모든 정점이 연결되었고 총 비용은 ${totalCost}입니다.`,
        codeLine: 14,
      }),
    );
  }

  _pickMin(frontier) {
    let bestId = null;
    let bestEntry = null;
    for (const [id, entry] of frontier) {
      if (
        bestEntry === null ||
        entry.cost < bestEntry.cost ||
        (entry.cost === bestEntry.cost && id < bestId)
      ) {
        bestId = id;
        bestEntry = entry;
      }
    }
    return bestId === null ? null : [bestId, bestEntry];
  }
}

// src/renderer.js — GraphRenderer: SVG 마운트·상태 반영·이벤트
// 의존성: graph.js

const SVG_NS = 'http://www.w3.org/2000/svg';
class GraphRenderer extends EventTarget {
  /**
   * @param {SVGElement} svgEl
   * @param {import('./graph.js').Graph} graph
   * @param {{ interactive?: boolean }} [options]
   */
  constructor(svgEl, graph, options = {}) {
    super();
    this.svgEl = svgEl;
    this.graph = graph;
    this.interactive = options.interactive !== false;
    this.nodeEls = new Map();
    this.edgeEls = new Map();
    this.edgeLabelEls = new Map();
    this._bounds = this._computeBounds();
    this._setupViewBox();
    this._nodeClickHandler = null;
  }

  _computeBounds() {
    // 노드 실제 경계 + 정점 반지름(22) + 라벨 박스 여유(14)를 위한 padding.
    // padding을 좌우·상하 모두 동일하게 적용해야 SVG가 컨테이너 정중앙에 렌더된다.
    if (this.graph.nodes.length === 0) {
      return { minX: 0, minY: 0, width: 100, height: 100 };
    }
    const xs = this.graph.nodes.map((n) => n.x);
    const ys = this.graph.nodes.map((n) => n.y);
    const pad = 48;
    const minX = Math.min(...xs) - pad;
    const maxX = Math.max(...xs) + pad;
    const minY = Math.min(...ys) - pad;
    const maxY = Math.max(...ys) + pad;
    return { minX, minY, width: maxX - minX, height: maxY - minY };
  }

  _setupViewBox() {
    const { minX, minY, width, height } = this._bounds;
    this.svgEl.setAttribute('viewBox', `${minX} ${minY} ${width} ${height}`);
    this.svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    if (this.interactive) {
      this.svgEl.setAttribute('role', 'application');
      this.svgEl.setAttribute('aria-label', '프림 알고리즘 인터랙티브 그래프');
    } else {
      this.svgEl.setAttribute('role', 'img');
      this.svgEl.setAttribute('aria-label', '프림 알고리즘 데모');
      this.svgEl.setAttribute('aria-hidden', 'true');
    }
  }

  mount() {
    this.svgEl.innerHTML = '';
    const defs = document.createElementNS(SVG_NS, 'defs');
    defs.innerHTML = `
      <pattern id="rejected-pattern" patternUnits="userSpaceOnUse" width="8" height="8">
        <path d="M 0 8 L 8 0" stroke="#aaa" stroke-width="1"/>
      </pattern>
    `;
    this.svgEl.appendChild(defs);

    const edgeLayer = document.createElementNS(SVG_NS, 'g');
    edgeLayer.setAttribute('class', 'edges');
    this.svgEl.appendChild(edgeLayer);

    const nodeLayer = document.createElementNS(SVG_NS, 'g');
    nodeLayer.setAttribute('class', 'nodes');
    this.svgEl.appendChild(nodeLayer);

    // 간선
    for (const e of this.graph.edges) {
      const u = this.graph.getNode(e.u);
      const v = this.graph.getNode(e.v);
      const line = document.createElementNS(SVG_NS, 'line');
      line.setAttribute('class', 'edge state-unexamined');
      line.setAttribute('data-edge-id', e.id);
      line.setAttribute('x1', u.x);
      line.setAttribute('y1', u.y);
      line.setAttribute('x2', v.x);
      line.setAttribute('y2', v.y);
      line.setAttribute('stroke-width', '3');
      edgeLayer.appendChild(line);
      this.edgeEls.set(e.id, line);

      // 가중치 라벨
      const mx = (u.x + v.x) / 2;
      const my = (u.y + v.y) / 2;
      const labelGroup = document.createElementNS(SVG_NS, 'g');
      labelGroup.setAttribute('class', 'edge-label');
      labelGroup.setAttribute('transform', `translate(${mx},${my})`);
      const bg = document.createElementNS(SVG_NS, 'rect');
      bg.setAttribute('x', '-14');
      bg.setAttribute('y', '-11');
      bg.setAttribute('width', '28');
      bg.setAttribute('height', '20');
      bg.setAttribute('rx', '4');
      bg.setAttribute('fill', '#FFFFFF');
      bg.setAttribute('stroke', '#E2DED3');
      const txt = document.createElementNS(SVG_NS, 'text');
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('dominant-baseline', 'central');
      txt.setAttribute('font-family', 'JetBrains Mono, Courier New, monospace');
      txt.setAttribute('font-size', '13');
      txt.setAttribute('fill', '#1A1A1A');
      txt.textContent = String(e.weight);
      labelGroup.appendChild(bg);
      labelGroup.appendChild(txt);
      edgeLayer.appendChild(labelGroup);
      this.edgeLabelEls.set(e.id, labelGroup);
    }

    // 정점
    for (const n of this.graph.nodes) {
      const g = document.createElementNS(SVG_NS, 'g');
      g.setAttribute('class', 'node state-unexplored');
      g.setAttribute('data-node-id', n.id);
      g.setAttribute('transform', `translate(${n.x},${n.y})`);
      if (this.interactive) {
        g.setAttribute('tabindex', '0');
        g.setAttribute('role', 'button');
        g.setAttribute('aria-label', `정점 ${n.label ?? n.id}. 클릭하면 이 정점에서 시작`);
      } else {
        g.setAttribute('aria-hidden', 'true');
      }

      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('r', '22');
      circle.setAttribute('stroke-width', '2');
      g.appendChild(circle);

      const label = document.createElementNS(SVG_NS, 'text');
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('dominant-baseline', 'central');
      label.setAttribute('font-family', 'Helvetica Neue, Arial, sans-serif');
      label.setAttribute('font-weight', '700');
      label.setAttribute('font-size', '15');
      label.textContent = n.label ?? n.id;
      g.appendChild(label);

      if (this.interactive) {
        const onSelect = () => {
          this.dispatchEvent(new CustomEvent('nodeClick', { detail: { id: n.id } }));
        };
        g.addEventListener('click', onSelect);
        g.addEventListener('keydown', (evt) => {
          if (evt.key === 'Enter' || evt.key === ' ') {
            evt.preventDefault();
            onSelect();
          }
        });
      }

      nodeLayer.appendChild(g);
      this.nodeEls.set(n.id, g);
    }
  }

  /**
   * @param {import('./prim.js').StepState} step
   */
  applyStepState(step, { animate = true } = {}) {
    if (!step) return;

    // 정점 상태 계산
    for (const n of this.graph.nodes) {
      const el = this.nodeEls.get(n.id);
      if (!el) continue;
      let state = 'unexplored';
      if (step.mstNodeIds.has(n.id)) state = 'in-tree';
      if (step.frontier.has(n.id)) state = 'frontier';
      if (step.currentNodeId === n.id) state = 'current';
      this._setNodeState(el, state);
    }

    // 간선 상태 계산
    for (const e of this.graph.edges) {
      const el = this.edgeEls.get(e.id);
      if (!el) continue;
      let state = 'unexamined';
      if (step.mstEdgeIds.has(e.id)) state = 'selected';
      if (step.consideredEdgeId === e.id) {
        state = step.rejectedReason ? 'rejected' : 'candidate';
      }
      this._setEdgeState(el, state);
    }

    // 애니메이션 억제(reduced motion 또는 animate=false)
    if (!animate) {
      this.svgEl.style.setProperty('--transition-duration', '0ms');
    } else {
      this.svgEl.style.removeProperty('--transition-duration');
    }
  }

  _setNodeState(el, state) {
    el.classList.remove('state-unexplored', 'state-frontier', 'state-in-tree', 'state-current');
    el.classList.add(`state-${state}`);
  }

  _setEdgeState(el, state) {
    el.classList.remove('state-unexamined', 'state-candidate', 'state-selected', 'state-rejected');
    el.classList.add(`state-${state}`);
  }

  destroy() {
    this.nodeEls.clear();
    this.edgeEls.clear();
    this.edgeLabelEls.clear();
    this.svgEl.innerHTML = '';
  }
}

// src/controller.js — PlaybackController + TutorialApp
// 의존성: graph.js, prim.js, renderer.js



const PSEUDOCODE_LINES = [
  '1  for each vertex in vertices do',
  '2    cheapestCost[vertex] ← ∞',
  '3    cheapestEdge[vertex] ← null',
  '4  startVertex의 cost를 0으로',
  '5  while unexplored is not empty do',
  '6    u ← argmin cheapestCost[v]',
  '7    unexplored.remove(u)',
  '8    explored.add(u)',
  '9    for each edge (u,neighbor) do',
  '10     if neighbor ∈ explored then continue  // 사이클',
  '11     if weight(u,neighbor) < cost[neighbor] then',
  '12       cost[neighbor] ← weight',
  '13       edge[neighbor] ← (u,neighbor)',
  '14 return edges',
];
class PlaybackController extends EventTarget {
  constructor(engine, renderer, options = {}) {
    super();
    this.engine = engine;
    this.renderer = renderer;
    this.currentStep = 0;
    this.speed = options.speed ?? 1;
    this.isPlaying = false;
    this._timer = null;
    this._reducedMotion =
      typeof window !== 'undefined' &&
      window.matchMedia?.('(prefers-reduced-motion: reduce)').matches;
    this._renderCurrent(false);
  }

  _renderCurrent(animate = true) {
    const step = this.engine.getStep(this.currentStep);
    this.renderer.applyStepState(step, { animate: animate && !this._reducedMotion });
    this.dispatchEvent(
      new CustomEvent('stepChange', {
        detail: {
          idx: this.currentStep,
          total: this.engine.totalSteps,
          phase: step.phase,
          totalCost: step.totalCost,
          explainKo: step.explainKo,
          codeLine: step.codeLine,
          frontier: step.frontier,
          mstNodeIds: step.mstNodeIds,
        },
      }),
    );
  }

  play() {
    if (this.isPlaying) return;
    if (this.currentStep >= this.engine.totalSteps - 1) {
      this.currentStep = 0;
      this._renderCurrent(false);
    }
    this.isPlaying = true;
    this.dispatchEvent(new CustomEvent('playStateChange', { detail: { playing: true } }));
    const tick = () => {
      if (!this.isPlaying) return;
      if (this.currentStep >= this.engine.totalSteps - 1) {
        this.isPlaying = false;
        this.dispatchEvent(new CustomEvent('complete'));
        this.dispatchEvent(new CustomEvent('playStateChange', { detail: { playing: false } }));
        return;
      }
      this.currentStep += 1;
      this._renderCurrent(true);
      this._timer = setTimeout(tick, 700 / this.speed);
    };
    this._timer = setTimeout(tick, 400 / this.speed);
  }

  pause() {
    if (!this.isPlaying) return;
    this.isPlaying = false;
    if (this._timer) clearTimeout(this._timer);
    this._timer = null;
    this.dispatchEvent(new CustomEvent('playStateChange', { detail: { playing: false } }));
  }

  step(dir) {
    this.pause();
    const next = this.currentStep + (dir > 0 ? 1 : -1);
    this.setStep(next);
  }

  reset() {
    this.pause();
    this.setStep(0);
  }

  setSpeed(mult) {
    this.speed = mult;
    this.dispatchEvent(new CustomEvent('speedChange', { detail: { speed: mult } }));
  }

  setStep(idx) {
    const clamped = Math.max(0, Math.min(this.engine.totalSteps - 1, idx));
    this.currentStep = clamped;
    this._renderCurrent(true);
  }

  destroy() {
    this.pause();
  }
}
class TutorialApp {
  constructor(rootEl) {
    this.rootEl = rootEl;
    this.currentPreset = 'cable';
    this.startNodeId = 'A';
    this.graph = null;
    this.engine = null;
    this.renderer = null;
    this.controller = null;
    this._chapter = 1;
  }

  async loadPreset(name) {
    try {
      const res = await fetch(`./presets/${name}.json`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      this.graph = Graph.fromPreset(json);
      this.currentPreset = name;
      this.startNodeId = json.startNodeId ?? this.graph.nodes[0].id;
      this._presetMeta = json;
      return json;
    } catch (err) {
      console.error('프리셋 로드 실패', err);
      throw err;
    }
  }

  bindVisualization({ svgEl }) {
    if (!this.graph) throw new Error('loadPreset() 먼저 호출');
    if (this.renderer) this.renderer.destroy();
    if (this.controller) this.controller.destroy();
    this.engine = new PrimEngine(this.graph, this.startNodeId);
    this.renderer = new GraphRenderer(svgEl, this.graph);
    this.renderer.mount();
    this.controller = new PlaybackController(this.engine, this.renderer, { speed: 1 });

    this.renderer.addEventListener('nodeClick', (evt) => {
      this.setStartNode(evt.detail.id);
    });

    return { engine: this.engine, renderer: this.renderer, controller: this.controller };
  }

  setStartNode(nodeId) {
    if (!this.graph?.getNode(nodeId)) return;
    this.startNodeId = nodeId;
    this.engine = new PrimEngine(this.graph, this.startNodeId);
    if (this.controller) {
      this.controller.engine = this.engine;
      this.controller.setStep(0);
    }
    this.rootEl.dispatchEvent(
      new CustomEvent('prim:startNodeChange', { detail: { id: nodeId }, bubbles: true }),
    );
  }

  async setPreset(name) {
    await this.loadPreset(name);
    const svgEl = this.rootEl.querySelector('[data-role="main-svg"]');
    if (svgEl) this.bindVisualization({ svgEl });
    this.rootEl.dispatchEvent(
      new CustomEvent('prim:presetLoaded', { detail: { name, graph: this.graph }, bubbles: true }),
    );
  }

  setChapter(n) {
    this._chapter = n;
    this.rootEl.querySelectorAll('[data-chapter]').forEach((el) => {
      el.classList.toggle('active', Number(el.dataset.chapter) === n);
    });
    this.rootEl.dispatchEvent(
      new CustomEvent('prim:chapterChange', { detail: { to: n }, bubbles: true }),
    );
  }

  saveProgress() {
    try {
      const data = {
        v: 1,
        lastPreset: this.currentPreset,
        speed: this.controller?.speed ?? 1,
        chapter: this._chapter,
      };
      localStorage.setItem('prim-tutorial:settings', JSON.stringify(data));
    } catch {
      /* storage blocked, ignore */
    }
  }

  restoreProgress() {
    try {
      const raw = localStorage.getItem('prim-tutorial:settings');
      if (!raw) return null;
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }

  attachKeyboardShortcuts() {
    document.addEventListener('keydown', (evt) => {
      if (evt.target.matches('input, textarea')) return;
      if (!this.controller) return;
      switch (evt.key) {
        case ' ':
          evt.preventDefault();
          if (this.controller.isPlaying) this.controller.pause();
          else this.controller.play();
          break;
        case 'ArrowRight':
          this.controller.step(+1);
          break;
        case 'ArrowLeft':
          this.controller.step(-1);
          break;
        case 'r':
        case 'R':
          this.controller.reset();
          break;
        case '1':
          this.controller.setSpeed(0.5);
          break;
        case '2':
          this.controller.setSpeed(1);
          break;
        case '3':
          this.controller.setSpeed(1.5);
          break;
      }
    });
  }
}

// src/hero-demo.js — Chapter 1 히어로의 자동 재생 미니 데모
// 의존성: prim.js, renderer.js
class HeroMiniDemo {
  constructor(svgEl, graph, startNodeId) {
    this.engine = new PrimEngine(graph, startNodeId);
    this.renderer = new GraphRenderer(svgEl, graph, { interactive: false });
    this.renderer.mount();
    this.idx = 0;
    this._timer = null;
    this._observer = null;
    this.svgEl = svgEl;
    this._reducedMotion =
      typeof window !== 'undefined' &&
      window.matchMedia?.('(prefers-reduced-motion: reduce)').matches;
  }

  start() {
    this.renderer.applyStepState(this.engine.getStep(0), { animate: false });
    if (this._reducedMotion) {
      // 즉시 최종 상태 표시
      this.renderer.applyStepState(this.engine.getStep(this.engine.totalSteps - 1), {
        animate: false,
      });
      return;
    }
    if ('IntersectionObserver' in window) {
      this._observer = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting && this.idx === 0) {
              setTimeout(() => this._tick(), 1500);
              this._observer.disconnect();
              break;
            }
          }
        },
        { threshold: 0.4 },
      );
      this._observer.observe(this.svgEl);
    } else {
      setTimeout(() => this._tick(), 1500);
    }
  }

  _tick() {
    if (this.idx >= this.engine.totalSteps - 1) return;
    this.idx += 1;
    this.renderer.applyStepState(this.engine.getStep(this.idx), { animate: true });
    this._timer = setTimeout(() => this._tick(), 700);
  }

  destroy() {
    if (this._timer) clearTimeout(this._timer);
    if (this._observer) this._observer.disconnect();
    this.renderer.destroy();
  }
}

// src/app.js — 진입점
// 의존성: controller.js

function formatFrontier(frontier) {
  if (frontier.size === 0) return '{ }';
  const parts = [];
  for (const [id, { cost }] of frontier) {
    parts.push(`${id}:${cost}`);
  }
  return `{ ${parts.sort().join(', ')} }`;
}

function renderCodePanel(codeEl) {
  codeEl.innerHTML = '';
  PSEUDOCODE_LINES.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'code-line';
    div.dataset.line = String(i + 1);
    div.textContent = line;
    codeEl.appendChild(div);
  });
}

function highlightCodeLine(codeEl, lineNo) {
  codeEl.querySelectorAll('.code-line').forEach((el) => {
    el.classList.toggle('active', Number(el.dataset.line) === lineNo);
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  const app = new TutorialApp(document.querySelector('main'));
  const restored = app.restoreProgress();
  if (restored?.lastPreset) app.currentPreset = restored.lastPreset;

  try {
    await app.loadPreset(app.currentPreset);
  } catch {
    await app.loadPreset('cable');
  }

  const svgEl = document.querySelector('[data-role="main-svg"]');
  const heroSvg = document.querySelector('[data-role="hero-svg"]');
  const codeEl = document.querySelector('[data-role="code-panel"]');
  const toastEl = document.querySelector('[data-role="toast"]');
  const progressEl = document.querySelector('[data-role="progress"]');
  const totalCostEl = document.querySelector('[data-role="total-cost"]');
  const frontierEl = document.querySelector('[data-role="frontier"]');
  const playBtn = document.querySelector('[data-action="play"]');
  const prevBtn = document.querySelector('[data-action="prev"]');
  const nextBtn = document.querySelector('[data-action="next"]');
  const resetBtn = document.querySelector('[data-action="reset"]');
  const speedBtns = document.querySelectorAll('[data-action="speed"]');
  const presetBtns = document.querySelectorAll('[data-action="preset"]');
  const storyEl = document.querySelector('[data-role="story"]');

  renderCodePanel(codeEl);

  app.bindVisualization({ svgEl });

  // Hero 프리뷰 (Chapter 1) — 동일 그래프, 자동 재생
  if (heroSvg) {
    const HeroMiniDemo = globalThis.HeroMiniDemo || null;
    if (HeroMiniDemo) {
      const demo = new HeroMiniDemo(heroSvg, app.graph, app.startNodeId);
      demo.start();
    }
  }

  const updateUI = (detail) => {
    if (toastEl) toastEl.textContent = detail.explainKo;
    if (progressEl) progressEl.textContent = `${detail.idx + 1} / ${detail.total}`;
    if (totalCostEl) {
      totalCostEl.textContent = String(detail.totalCost);
    }
    if (frontierEl) frontierEl.textContent = formatFrontier(detail.frontier);
    if (codeEl) highlightCodeLine(codeEl, detail.codeLine);
  };

  const attachControllerListeners = () => {
    const c = app.controller;
    c.addEventListener('stepChange', (evt) => updateUI(evt.detail));
    c.addEventListener('playStateChange', (evt) => {
      if (playBtn) {
        playBtn.textContent = evt.detail.playing ? '⏸ 일시정지' : '▶ 재생';
        playBtn.setAttribute('aria-pressed', String(evt.detail.playing));
      }
    });
    c.addEventListener('complete', () => {
      if (toastEl) toastEl.classList.add('complete');
    });
  };
  attachControllerListeners();

  playBtn?.addEventListener('click', () => {
    const c = app.controller;
    if (c.isPlaying) c.pause();
    else c.play();
  });
  prevBtn?.addEventListener('click', () => app.controller.step(-1));
  nextBtn?.addEventListener('click', () => app.controller.step(+1));
  resetBtn?.addEventListener('click', () => app.controller.reset());
  for (const btn of speedBtns) {
    btn.addEventListener('click', () => {
      const v = Number(btn.dataset.speed);
      app.controller.setSpeed(v);
      for (const b of speedBtns) b.classList.toggle('active', b === btn);
    });
  }
  for (const btn of presetBtns) {
    btn.addEventListener('click', async () => {
      const name = btn.dataset.preset;
      const activeSpeedBtn = [...speedBtns].find((b) => b.classList.contains('active'));
      const prevSpeed = activeSpeedBtn ? Number(activeSpeedBtn.dataset.speed) : 1;
      await app.setPreset(name);
      // 새 controller가 생성되었으므로 리스너 재부착 + 속도 이어받기
      attachControllerListeners();
      app.controller.setSpeed(prevSpeed);
      for (const b of presetBtns) b.classList.toggle('active', b === btn);
      if (storyEl && app._presetMeta?.story) {
        storyEl.textContent = app._presetMeta.story;
      }
      // 새 그래프 바인딩 후 초기 스텝 표시
      updateUI({
        idx: 0,
        total: app.engine.totalSteps,
        totalCost: 0,
        explainKo: `"${name}" 프리셋을 불러왔어요. ▶ 재생을 눌러보세요.`,
        codeLine: 1,
        frontier: new Map(),
      });
    });
  }

  if (storyEl && app._presetMeta?.story) {
    storyEl.textContent = app._presetMeta.story;
  }

  app.attachKeyboardShortcuts();
  app.saveProgress();

  // 초기 1스텝 보여주기
  updateUI({
    idx: 0,
    total: app.engine.totalSteps,
    totalCost: 0,
    explainKo: `▶ 재생을 눌러 프림 알고리즘을 실행해보세요.`,
    codeLine: 1,
    frontier: new Map([[app.startNodeId, { cost: 0, viaEdgeId: null }]]),
  });
});


globalThis.HeroMiniDemo = HeroMiniDemo;

</script>
